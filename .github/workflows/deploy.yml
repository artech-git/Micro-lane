name: Deploy

on:
  workflow_run:
    workflows: ["Rust Build"]
    types:
      - completed

env:
  SERVICE_NAME: micro-lane.service
  RELEASE_DIR: ./release/

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact from workflow run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: main.yml
          name: rust-build
          path: ${{ env.RELEASE_DIR }}
          run_id: ${{ github.event.workflow_run.id }}

      - name: Check downloaded files
        run: |
          echo "=== Downloaded files ==="
          ls -lah ${{ env.RELEASE_DIR }}
          echo "=== Making binary executable ==="
          chmod +x ${{ env.RELEASE_DIR }}*

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz \
            --delete \
            ${{ env.RELEASE_DIR }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/micro-lane/

      - name: Restart service
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            chmod +x /home/${{ secrets.SSH_USER }}/micro-lane/*
            systemctl restart ${{ env.SERVICE_NAME }}
            systemctl status ${{ env.SERVICE_NAME }} --no-pager
          EOF